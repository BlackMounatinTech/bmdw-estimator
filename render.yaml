# Render service definition. Once committed, Render will use this on next
# deploy instead of (or in addition to) settings in the web UI.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: bmdw-estimator
    runtime: python
    region: oregon
    plan: starter             # disks require Starter ($7/mo) or higher; not on free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run Quoting.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true
    envVars:
      # Set the actual values in the Render dashboard, not here.
      # `sync: false` means Render won't overwrite the value if you change it via UI.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: BMDW_APP_PASSWORD
        sync: false
      # Point the app at the persistent disk so SQLite + uploads survive deploys.
      - key: BMDW_DATA_DIR
        value: /var/data
    # Persistent disk — survives every deploy. Holds the SQLite DB and all
    # uploaded files (photos, plans, BC One Call docs). 1 GB is plenty for
    # a single-operator contractor for years.
    disk:
      name: bmdw-data
      mountPath: /var/data
      sizeGB: 1
    autoDeploy: true
