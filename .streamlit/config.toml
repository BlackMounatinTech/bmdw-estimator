# Streamlit theme — dark base with BMT-aligned colors. This makes the built-in
# selectbox / textinput / button / popover components render with dark backgrounds
# automatically, instead of fighting the default light theme via CSS overrides.
[theme]
base = "light"
primaryColor = "#2563eb"           # accent blue
backgroundColor = "#f8fafc"        # main app background — light slate
secondaryBackgroundColor = "#ffffff"  # cards, inputs, dropdown panels
textColor = "#0f172a"              # body / heading text
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false
